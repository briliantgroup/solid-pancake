name: VPN Checker

on:
  schedule:
    - cron: "0 */3 * * *" # каждые 3 часа
  workflow_dispatch: # ручной запуск из интерфейса GitHub

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        # v5 требует Node.js 20+ — предупреждение можно игнорировать,
        # или перейти на setup-python@v6 когда выйдет
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt PySocks

      - name: Run checker (basic pass)
        run: |
          python checker.py \
            --workers 100 \
            --timeout 3 \
            --tcp-timeout 2 \
            --tcp-workers 500 \
            --warmup 400 \
            --max-ping 1500
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run speed pass (on working keys only)
        run: |
          python checker.py \
            --speed-only \
            --workers 50 \
            --warmup 400 \
            --speed-max-mb 5
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show stats
        run: |
          echo "=== Stats ==="
          cat results/stats.json || true
          echo ""
          echo "=== Countries ==="
          ls results/countries/ | sort || true

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "🔄 Auto-check: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
