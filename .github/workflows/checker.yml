name: VPN Checker

on:
  schedule:
    - cron: '0 */3 * * *'   # каждые 3 часа
  workflow_dispatch:          # ручной запуск из интерфейса GitHub

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        run: |
          python checker.py \
            --workers 10 \
            --batch 50 \
            --timeout 3 \
            --tcp-timeout 2 \
            --tcp-workers 300 \
            --warmup 600 \
            --max-ping 1500
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show stats
        run: |
          echo "=== Stats ==="
          cat results/stats.json || true
          echo ""
          echo "=== Countries ==="
          ls results/countries/ | sort || true

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "🔄 Auto-check: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
